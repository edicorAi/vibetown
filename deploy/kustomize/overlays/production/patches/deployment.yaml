apiVersion: apps/v1
kind: Deployment
metadata:
  name: vibetown
spec:
  replicas: 2
  template:
    spec:
      containers:
        - name: server
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
        - name: engine
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 2Gi
      volumes:
        - name: worktrees
          persistentVolumeClaim:
            claimName: vibetown-worktrees
