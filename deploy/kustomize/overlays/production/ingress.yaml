apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: vibetown
  namespace: vibetown
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
spec:
  ingressClassName: nginx
  rules:
    - host: vibetown.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: vibetown
                port:
                  name: http
  tls:
    - hosts:
        - vibetown.example.com
      secretName: vibetown-tls
